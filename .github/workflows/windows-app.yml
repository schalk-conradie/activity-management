name: Windows App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test .NET solution
        run: dotnet test ActivityManagement.slnx

  package:
    name: Package MSIX
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Calculate package version
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if ($env:REF_TYPE -eq "tag" -and $env:REF_NAME -match "^v?(\d+)\.(\d+)\.(\d+)$") {
            $semver = "$($matches[1]).$($matches[2]).$($matches[3])"
          } else {
            $semver = "1.0.0"
          }

          $msixVersion = "$semver.${{ github.run_number }}"
          "semver=$semver" >> $env:GITHUB_OUTPUT
          "msix_version=$msixVersion" >> $env:GITHUB_OUTPUT

      - name: Prepare signing certificate
        id: signing
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64)) {
            throw "Set the WINDOWS_PFX_BASE64 repository secret to a base64-encoded code signing .pfx."
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_PASSWORD)) {
            throw "Set the WINDOWS_PFX_PASSWORD repository secret."
          }

          $certPath = Join-Path $env:RUNNER_TEMP "activity-management-signing.pfx"
          $pfxBase64 = $env:WINDOWS_PFX_BASE64 -replace '\s', ''
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($pfxBase64))
          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath, $env:WINDOWS_PFX_PASSWORD)
          $publicCertPath = Join-Path $env:RUNNER_TEMP "ActivityManagement-Signing.cer"
          [IO.File]::WriteAllBytes($publicCertPath, $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))

          "cert_path=$certPath" >> $env:GITHUB_OUTPUT
          "public_cert_path=$publicCertPath" >> $env:GITHUB_OUTPUT
          "publisher=$($cert.Subject)" >> $env:GITHUB_OUTPUT

      - name: Stamp package manifest
        shell: pwsh
        run: |
          $manifestPath = Join-Path $env:GITHUB_WORKSPACE "src\ActivityManagement.App\Package.appxmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $namespace = [System.Xml.XmlNamespaceManager]::new($manifest.NameTable)
          $namespace.AddNamespace("m", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
          $identity = $manifest.SelectSingleNode("/m:Package/m:Identity", $namespace)
          $identity.Version = "${{ steps.version.outputs.msix_version }}"
          $identity.Publisher = "${{ steps.signing.outputs.publisher }}"
          $manifest.Save($manifestPath)

      - name: Build signed MSIX
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\msix"
          New-Item -ItemType Directory -Force $packageDir | Out-Null

          $arguments = @(
            "src\ActivityManagement.App\ActivityManagement.App.csproj",
            "/restore",
            "/p:Configuration=Release",
            "/p:Platform=x64",
            "/p:RuntimeIdentifier=win-x64",
            "/p:WindowsPackageType=MSIX",
            "/p:GenerateAppxPackageOnBuild=true",
            "/p:AppxPackageSigningEnabled=true",
            "/p:PackageCertificateKeyFile=${{ steps.signing.outputs.cert_path }}",
            "/p:PackageCertificatePassword=$env:WINDOWS_PFX_PASSWORD",
            "/p:UapAppxPackageBuildMode=SideloadOnly",
            "/p:AppxBundle=Never",
            "/p:AppxPackageDir=$packageDir\"
          )

          & msbuild @arguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Locate app package
        id: msix
        shell: pwsh
        run: |
          $package = Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE "artifacts\msix") -Recurse -Filter "ActivityManagement.App_*.msix" |
            Where-Object { $_.DirectoryName -notmatch "\\Dependencies(\\|$)" } |
            Select-Object -First 1
          if ($null -eq $package) {
            throw "MSIX package was not created."
          }

          "path=$($package.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create App Installer file
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          $msixPath = Join-Path $releaseDir "ActivityManagement-x64.msix"
          Copy-Item "${{ steps.msix.outputs.path }}" $msixPath -Force
          Copy-Item "${{ steps.signing.outputs.public_cert_path }}" (Join-Path $releaseDir "ActivityManagement-Signing.cer") -Force
          Copy-Item "scripts\Install-ActivityManagement.ps1" (Join-Path $releaseDir "Install-ActivityManagement.ps1") -Force

          $manifestPath = Join-Path $env:GITHUB_WORKSPACE "src\ActivityManagement.App\Package.appxmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $namespace = [System.Xml.XmlNamespaceManager]::new($manifest.NameTable)
          $namespace.AddNamespace("m", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
          $identity = $manifest.SelectSingleNode("/m:Package/m:Identity", $namespace)

          $version = "${{ steps.version.outputs.msix_version }}"
          $baseUri = "https://github.com/${{ github.repository }}/releases/latest/download"
          $appInstallerUri = "$baseUri/ActivityManagement.appinstaller"
          $msixUri = "$baseUri/ActivityManagement-x64.msix"
          $publisher = [System.Security.SecurityElement]::Escape($identity.Publisher)

          $appInstaller = @"
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller xmlns="http://schemas.microsoft.com/appx/appinstaller/2021" Version="$version" Uri="$appInstallerUri">
            <MainPackage Name="$($identity.Name)" Publisher="$publisher" Version="$version" ProcessorArchitecture="x64" Uri="$msixUri" />
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="0" ShowPrompt="true" UpdateBlocksActivation="true" />
              <AutomaticBackgroundTask />
            </UpdateSettings>
          </AppInstaller>
          "@

          $appInstallerPath = Join-Path $releaseDir "ActivityManagement.appinstaller"
          $appInstaller.TrimStart() | Set-Content $appInstallerPath -Encoding UTF8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: activity-management-installer
          path: artifacts/release/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --json tagName 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Activity Management $tag"
          }

          gh release upload $tag `
            "artifacts\release\ActivityManagement-x64.msix" `
            "artifacts\release\ActivityManagement-Signing.cer" `
            "artifacts\release\Install-ActivityManagement.ps1" `
            "artifacts\release\ActivityManagement.appinstaller" `
            --clobber
