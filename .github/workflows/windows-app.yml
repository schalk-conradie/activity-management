name: Windows App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test .NET solution
        run: dotnet test ActivityManagement.slnx

  package:
    name: Package Velopack Installer
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Calculate package version
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if ($env:REF_TYPE -eq "tag" -and $env:REF_NAME -match "^v?(\d+)\.(\d+)\.(\d+)$") {
            $semver = "$($matches[1]).$($matches[2]).$($matches[3])"
          } else {
            $semver = "1.0.0"
          }

          "semver=$semver" >> $env:GITHUB_OUTPUT

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish src\ActivityManagement.App\ActivityManagement.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:Version=${{ steps.version.outputs.semver }} `
            -o artifacts\publish

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version 1.2.0

      - name: Package installer
        shell: pwsh
        run: |
          vpk pack `
            --packId ActivityManagement `
            --packTitle "Activity Management" `
            --packAuthors "Schalk" `
            --packVersion ${{ steps.version.outputs.semver }} `
            --packDir artifacts\publish `
            --mainExe ActivityManagement.App.exe `
            --icon src\ActivityManagement.App\Assets\app-icon.ico `
            --outputDir artifacts\velopack

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: activity-management-installer
          path: artifacts/velopack/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --json tagName 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Activity Management $tag"
          }

          $assets = Get-ChildItem "artifacts\velopack" -File | ForEach-Object { $_.FullName }
          gh release upload $tag @assets --clobber
